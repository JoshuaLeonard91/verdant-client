name: Windows Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: flutter-windows-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build signed Windows release
    if: ${{ github.repository == 'JoshuaLeonard91/verdant-client' }}
    runs-on: windows-latest
    environment: signed-windows-release
    steps:
      - name: Resolve requested release tag
        id: release_ref
        env:
          RAW_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          RAW_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
        shell: pwsh
        run: |
          $tag = $env:RAW_TAG
          $prerelease = $env:RAW_PRERELEASE
          if ($tag -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+$') {
            throw "Release tags must look like v0.1.0; got '$tag'."
          }
          if ($prerelease -ne "true") {
            $prerelease = "false"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Checkout public source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: refs/tags/${{ steps.release_ref.outputs.tag }}

      - name: Validate release source
        id: source
        env:
          RELEASE_TAG: ${{ steps.release_ref.outputs.tag }}
        shell: pwsh
        run: |
          git fetch --force origin `
            "refs/heads/main:refs/remotes/origin/main" `
            "refs/tags/$($env:RELEASE_TAG):refs/tags/$($env:RELEASE_TAG)"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to fetch main and release tag."
          }
          $checkedOutSha = (git rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to resolve checked-out commit."
          }
          $tagSha = (git rev-list -n 1 "refs/tags/$($env:RELEASE_TAG)").Trim()
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to resolve release tag commit."
          }
          if ($checkedOutSha -ne $tagSha) {
            throw "Checked-out commit $checkedOutSha does not match $($env:RELEASE_TAG) commit $tagSha."
          }
          git merge-base --is-ancestor $checkedOutSha origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release tag $($env:RELEASE_TAG) must point at a commit already merged to public main."
          }
          "sha=$checkedOutSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Resolve release version
        id: release
        env:
          RELEASE_TAG: ${{ steps.release_ref.outputs.tag }}
          RELEASE_PRERELEASE: ${{ steps.release_ref.outputs.prerelease }}
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $prerelease = $env:RELEASE_PRERELEASE
          if ($tag -notmatch '^v(?<version>[0-9]+\.[0-9]+\.[0-9]+)$') {
            throw "Release tags must look like v0.1.0; got '$tag'."
          }
          $version = $Matches.version
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true

      - name: Ensure NuGet CLI
        shell: pwsh
        run: |
          if (-not (Get-Command nuget.exe -ErrorAction SilentlyContinue)) {
            choco install nuget.commandline -y --no-progress
          }

      - name: Ensure Inno Setup
        shell: pwsh
        run: |
          $iscc = Get-Command ISCC.exe -ErrorAction SilentlyContinue
          $defaultIscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not $iscc -and -not (Test-Path -LiteralPath $defaultIscc)) {
            choco install InnoSetup --version=6.7.1 -y --no-progress
          }
          if (Test-Path -LiteralPath $defaultIscc) {
            $isccPath = $defaultIscc
          } else {
            $isccPath = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source
          }
          if (-not $isccPath) {
            throw "ISCC.exe was not found after installing Inno Setup."
          }
          $productVersion = (Get-Item -LiteralPath $isccPath).VersionInfo.ProductVersion
          if ($productVersion -notlike "6.7.1*") {
            throw "Unexpected Inno Setup version at $isccPath`: $productVersion"
          }
          Write-Host "Using Inno Setup compiler $productVersion at $isccPath"

      - name: Build Flutter Windows release
        env:
          CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
          VERDANT_OFFICIAL_CERT_SHA256_PINS: ${{ secrets.VERDANT_OFFICIAL_CERT_SHA256_PINS || vars.VERDANT_OFFICIAL_CERT_SHA256_PINS }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VERDANT_OFFICIAL_CERT_SHA256_PINS)) {
            throw "VERDANT_OFFICIAL_CERT_SHA256_PINS must be configured in the signed-windows-release environment."
          }
          .\scripts\release_flutter_windows.ps1 -NoBuild -Version $env:RELEASE_VERSION
          $buildNumber = ($env:RELEASE_VERSION -split '\.')[-1]
          .\scripts\flutter_windows.ps1 -Action build -Config release -BuildName $env:RELEASE_VERSION -BuildNumber $buildNumber

      - name: Azure login
        uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows executable
        uses: Azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files: ${{ github.workspace }}\build\windows\x64\runner\Release\verdant_flutter.exe
          exclude-workload-identity-credential: false
          trace: false

      - name: Verify Windows signature
        shell: pwsh
        run: |
          $exe = Join-Path $env:GITHUB_WORKSPACE "build\windows\x64\runner\Release\verdant_flutter.exe"
          $signature = Get-AuthenticodeSignature -FilePath $exe
          if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid) {
            throw "Authenticode signature verification failed: $($signature.StatusMessage)"
          }
          if (-not $signature.SignerCertificate) {
            throw "Authenticode signer certificate is missing."
          }
          if (-not $signature.TimeStamperCertificate) {
            throw "Authenticode timestamp countersignature is missing."
          }

      - name: Package Windows installer
        id: package
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "build\windows\x64\runner\Release"
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          $installerPath = Join-Path $artifactDir ("VerdantFlutter_{0}_windows_x64_setup.exe" -f $env:RELEASE_VERSION)
          if (Test-Path -LiteralPath $installerPath) {
            Remove-Item -LiteralPath $installerPath -Force
          }
          .\scripts\create_windows_installer.ps1 -Version $env:RELEASE_VERSION -ReleaseDir $releaseDir -OutputDir $artifactDir
          if ($LASTEXITCODE -ne 0) {
            throw "Windows installer packaging failed with exit code $LASTEXITCODE."
          }
          if (-not (Test-Path -LiteralPath $installerPath)) {
            throw "Windows installer was not created: $installerPath"
          }
          "installer=$installerPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Sign Windows installer
        uses: Azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files: ${{ steps.package.outputs.installer }}
          exclude-workload-identity-credential: false
          trace: false

      - name: Verify Windows installer signature
        env:
          RELEASE_INSTALLER: ${{ steps.package.outputs.installer }}
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature -FilePath $env:RELEASE_INSTALLER
          if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid) {
            throw "Authenticode installer signature verification failed: $($signature.StatusMessage)"
          }
          if (-not $signature.SignerCertificate) {
            throw "Authenticode installer signer certificate is missing."
          }
          if (-not $signature.TimeStamperCertificate) {
            throw "Authenticode installer timestamp countersignature is missing."
          }

      - name: Write release checksums
        id: checksums
        env:
          RELEASE_INSTALLER: ${{ steps.package.outputs.installer }}
        shell: pwsh
        run: |
          $artifactDir = Split-Path -Parent $env:RELEASE_INSTALLER
          $checksumsPath = Join-Path $artifactDir "SHA256SUMS"
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $env:RELEASE_INSTALLER
          "{0}  {1}" -f $hash.Hash.ToLowerInvariant(), (Split-Path -Leaf $env:RELEASE_INSTALLER) |
            Set-Content -Encoding ascii -LiteralPath $checksumsPath
          "checksums=$checksumsPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Attest Windows installer
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: ${{ steps.package.outputs.installer }}

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_PRERELEASE: ${{ steps.release.outputs.prerelease }}
          RELEASE_INSTALLER: ${{ steps.package.outputs.installer }}
          RELEASE_CHECKSUMS: ${{ steps.checksums.outputs.checksums }}
        shell: pwsh
        run: |
          $notes = @"
          Flutter Windows release $env:RELEASE_VERSION.

          Assets:
          - $(Split-Path -Leaf $env:RELEASE_INSTALLER)
          - SHA256SUMS

          The installer and bundled Windows executable are signed with Azure Artifact Signing.
          Verify the installer checksum and GitHub artifact attestation before installing.
          "@
          $releaseArgs = @()
          if ($env:RELEASE_PRERELEASE -eq "true") {
            $releaseArgs += "--prerelease"
          }
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "Release $env:RELEASE_TAG already exists. Refusing to replace release assets."
          }
          gh release create $env:RELEASE_TAG $env:RELEASE_INSTALLER $env:RELEASE_CHECKSUMS `
            --title "Verdant Flutter $env:RELEASE_VERSION" `
            --notes $notes `
            @releaseArgs
